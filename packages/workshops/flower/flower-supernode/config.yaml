# Use newer ROCm 7.2 base image for Strix Halo support
init_image: "rocm/pytorch:rocm7.2.1_ubuntu24.04_py3.12_pytorch_release_2.9.1"

# GPU support for SuperNode
gpu_support: true

# No X11 needed
x11_display: false

# Note: HSA_OVERRIDE_GFX_VERSION removed to let ROCm auto-detect GPU

# Network will be set to flwr-network via build script (replaces default --network=host)
