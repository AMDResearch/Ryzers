# No GPU needed for SuperNode (client manager)
gpu_support: false

# No X11 needed
x11_display: false

# Bridge network for Flower communication
# Note: Container name is set per-instance in the start script
docker_extra_run_flags:
    - "--rm"
    - "--network flwr-network"
