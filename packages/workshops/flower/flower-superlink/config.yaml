# No GPU needed for SuperLink (coordinator)
gpu_support: false

# No X11 needed
x11_display: false

# Bridge network and port mappings for Flower communication
docker_extra_run_flags:
    - "--network flwr-network"
    - "-p 9091:9091"
    - "-p 9092:9092"
    - "-p 9093:9093"
