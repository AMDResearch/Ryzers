# GPU support for SuperLink
gpu_support: true

# No X11 needed
x11_display: false

# Note: HSA_OVERRIDE_GFX_VERSION removed to let ROCm auto-detect GPU

# Port mappings for Flower communication (network set via build script)
docker_extra_run_flags:
    - "--name flower-superlink"
    - "-p 9091:9091"
    - "-p 9092:9092"
    - "-p 9093:9093"
