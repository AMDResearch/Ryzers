# No GPU needed for SuperLink (coordinator)
gpu_support: false

# No X11 needed
x11_display: false

# Port mappings for Flower communication (network set via build script)
docker_extra_run_flags:
    - "--name flower-superlink"
    - "-p 9091:9091"
    - "-p 9092:9092"
    - "-p 9093:9093"
