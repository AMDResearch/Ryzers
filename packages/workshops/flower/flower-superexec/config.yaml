# Use newer ROCm 7.2 base image for Strix Halo support
init_image: "rocm/pytorch:rocm7.2.1_ubuntu24.04_py3.12_pytorch_release_2.9.1"

# GPU support for training
gpu_support: true

# No X11 needed
x11_display: false

# Environment variables for ROCm gfx1151 (Strix Halo) compatibility
environment_variables:
    - "HSA_OVERRIDE_GFX_VERSION=11.0.0"
    - "FLWR_HOME=/app/.flwr"

# Volume mount for Flower workspace (network set via build script)
# Note: Start scripts export FLOWER_PROJECT environment variable
docker_extra_run_flags:
    - "-v $FLOWER_PROJECT:/app"
    - "--privileged"
