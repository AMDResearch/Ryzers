# Note: Port mappings will be overridden per instance in the start script
# These are the default ports for supernode instances

# Enable AMD GPU support
gpu_support: true

# Use custom Docker network for Flower communication
docker_network: flwr-network

# Run in detached mode (background) instead of interactive
detached_mode: true
