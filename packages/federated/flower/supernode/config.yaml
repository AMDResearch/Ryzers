# Shared configuration for all supernode instances
# Note: Port mappings are set per instance in start_supernodes.sh

# Enable AMD GPU support
gpu_support: true

# GPU environment variables for AMD ROCm
environment_variables:
- "HSA_OVERRIDE_GFX_VERSION=11.0.0"

# Use custom Docker network for Flower communication
docker_network: flwr-network

# Run in detached mode (background) instead of interactive
detached_mode: true
