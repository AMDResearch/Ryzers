### ryzers build options

# GPU support enabled for AMD GPU acceleration via ROCm
# gpu_support: true  # default

# No X11 display needed
x11_display: false

# Use host network for build to resolve DNS
docker_extra_build_flags: "--network=host"

### ryzers run options

# HSA override for AMD GPU compatibility
# Common values: 11.0.0 (RDNA 3), 10.3.0 (RDNA 2), 9.0.0 (Vega)
environment_variables:
- "HSA_OVERRIDE_GFX_VERSION=11.0.0"
- "GPU_MAX_HEAP_SIZE=40"
- "PYTHONPATH=/ryzers"

# Note: Network and detach mode are set at runtime via demo.sh
# docker_extra_run_flags: "--network=flwr-network"
