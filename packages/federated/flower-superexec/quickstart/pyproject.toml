[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quickstart-amd"
version = "1.0.9"
description = "Federated Learning with PyTorch and Flower on AMD GPUs"
license = "MIT"
dependencies = [
    "flwr-datasets[vision]>=0.5.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["quickstart_amd*"]

[tool.flwr.app]
publisher = "amd-ryzers"

[tool.flwr.app.components]
serverapp = "quickstart_amd.server_app:app"
clientapp = "quickstart_amd.client_app:app"

[tool.flwr.app.config]
num-server-rounds = 3
fraction-evaluate = 0.5
local-epochs = 1
learning-rate = 0.1
batch-size = 32

[tool.flwr.federations]
default = "local-deployment"

[tool.flwr.federations.local-deployment]
address = "superlink:9093"
insecure = true
