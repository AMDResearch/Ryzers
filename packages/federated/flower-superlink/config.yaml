### ryzers build options

# No GPU needed for coordination server
gpu_support: false

# No X11 display needed
x11_display: false

# Use host network for build to resolve DNS
docker_extra_build_flags: "--network=host"

### ryzers run options

# SuperLink ports
port_mappings:
- "9091:9091"  # ServerAppIO API
- "9092:9092"  # Fleet API
- "9093:9093"  # Control API

# Use bridge network for container-to-container DNS resolution
# Create network first: docker network create flwr-network
docker_extra_run_flags: "--network=flwr-network --name=superlink"
