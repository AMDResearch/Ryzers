### ryzers build options

# No GPU needed for node coordination
gpu_support: false

# No X11 display needed
x11_display: false

# Use host network for build to resolve DNS
docker_extra_build_flags: "--network=host"

### ryzers run options

# SuperNode ClientAppIO API port (override with -p for multiple nodes)
port_mappings:
- "9094:9094"

# Disable host network to allow bridge network for container-to-container DNS
host_network: false
