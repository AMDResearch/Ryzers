### ryzers build options

# No GPU needed for node coordination
gpu_support: false

# No X11 display needed
x11_display: false

# Use host network for build to resolve DNS
docker_extra_build_flags: "--network=host"

### ryzers run options

# Port mappings are specified at runtime for each node instance
# (e.g., -p 9094:9094 for node 1, -p 9095:9095 for node 2)

# Disable host network to allow bridge network for container-to-container DNS
host_network: false

# Keep containers after exit for debugging (docker logs <container>)
keep_container: true
