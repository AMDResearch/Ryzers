### ryzers build options

# No GPU needed for node coordination
gpu_support: false

# No X11 display needed
x11_display: false

# Use host network for build to resolve DNS
docker_extra_build_flags: "--network=host"

### ryzers run options

# SuperNode ClientAppIO API port
port_mappings:
- "9094:9094"

# Use bridge network for container-to-container DNS resolution
# Create network first: docker network create flwr-network
# Override --name for each supernode instance (e.g., --name=supernode-1)
docker_extra_run_flags: "--network=flwr-network"
