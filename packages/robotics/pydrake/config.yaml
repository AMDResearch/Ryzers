### ryzers build options

# GPU support enabled (default)
# gpu_support: true

# X11 display for visualization
# x11_display: true

### ryzers run options

# Strix Point gfx1150 HSA override
environment_variables:
  - "HSA_OVERRIDE_GFX_VERSION=11.0.0"
  - "PYOPENGL_PLATFORM=egl"

# Meshcat web visualization
port_mappings:
  - "7000:7000"

# Cache HuggingFace models and Drake assets
volume_mappings:
  - "$PWD/workspace/.cache:/root/.cache"

# Extra shared memory for large simulations
docker_extra_run_flags: "--shm-size=4g"
